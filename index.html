<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Roadmap | Light Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --primary-blue: #2563eb;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --border: #e2e8f0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            margin: 0;
            padding: 50px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.02em;
        }

        /* The 2-Column Grid */
        #roadmap {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .week-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .week-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .week-tag {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary-blue);
            background: #eff6ff;
            padding: 4px 12px;
            border-radius: 100px;
            width: fit-content;
            margin-bottom: 12px;
        }

        .week-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .topic-pill {
            display: inline-block;
            font-size: 0.8rem;
            background: #f1f5f9;
            color: var(--text-muted);
            padding: 3px 10px;
            border-radius: 6px;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .problem-container {
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .problem-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: #fafafa;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .problem-link:hover {
            background: #fdfdfd;
            border-color: var(--primary-blue);
        }

        .problem-info span {
            display: block;
        }

        .p-name {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .p-logic {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Responsive: Stack columns on smaller screens */
        @media (max-width: 850px) {
            #roadmap {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>DSA Mastery Roadmap</h1>
        <p style="color: var(--text-muted)">A structured 8-week guide to technical proficiency.</p>
    </header>

    <div id="roadmap">
        </div>
</div>

<script>
    // Using the data from your previous JSON
    const data = {
      "weeks": [
        {
          "week": 1,
          "title": "Arrays & Basic Hashing",
          "topics": ["Prefix Sum", "Two Pointer", "Sliding Window"],
          "problems": [
            { "name": "Two Sum", "url": "https://leetcode.com/problems/two-sum/", "logic": "HashMap complement lookup." },
            { "name": "Kadane's Algorithm", "url": "https://leetcode.com/problems/maximum-subarray/", "logic": "Local vs Global Max." }
          ]
        },
        {
          "week": 2,
          "title": "Sorting & Searching",
          "topics": ["Binary Search", "Custom Sort"],
          "problems": [
            { "name": "Search in Rotated Array", "url": "https://leetcode.com/problems/search-in-rotated-sorted-array/", "logic": "Modified Binary Search." },
            { "name": "Aggressive Cows", "url": "https://www.geeksforgeeks.org/problems/aggressive-cows/1", "logic": "BS on Answer space." }
          ]
        },
        {
          "week": 3,
          "title": "Strings",
          "topics": ["Sliding Window", "Anagrams"],
          "problems": [
            { "name": "Valid Anagram", "url": "https://leetcode.com/problems/valid-anagram/", "logic": "Frequency array/map." },
            { "name": "Group Anagrams", "url": "https://leetcode.com/problems/group-anagrams/", "logic": "Sorted key mapping." }
          ]
        },
        {
          "week": 4,
          "title": "Linked List",
          "topics": ["Fast/Slow", "Reversal"],
          "problems": [
            { "name": "Reverse List", "url": "https://leetcode.com/problems/reverse-linked-list/", "logic": "Pointer manipulation." },
            { "name": "Cycle Detection", "url": "https://leetcode.com/problems/linked-list-cycle/", "logic": "Floyd's algorithm." }
          ]
        },
        {
          "week": 5,
          "title": "Stacks & Queues",
          "topics": ["Monotonic Stack", "Simulation"],
          "problems": [
            { "name": "Valid Parentheses", "url": "https://leetcode.com/problems/valid-parentheses/", "logic": "Standard LIFO check." },
            { "name": "Next Greater Element", "url": "https://leetcode.com/problems/next-greater-element-i/", "logic": "Monotonic decrease." }
          ]
        },
        {
          "week": 6,
          "title": "Trees (Binary & BST)",
          "topics": ["BFS/DFS", "Height/Diameter"],
          "problems": [
            { "name": "Max Depth", "url": "https://leetcode.com/problems/maximum-depth-of-binary-tree/", "logic": "Recursive height calc." },
            { "name": "Validate BST", "url": "https://leetcode.com/problems/validate-binary-search-tree/", "logic": "Range constraints." }
          ]
        },
        {
          "week": 7,
          "title": "Backtracking",
          "topics": ["Permutations", "Subsets"],
          "problems": [
            { "name": "Subsets", "url": "https://leetcode.com/problems/subsets/", "logic": "Power set generation." },
            { "name": "N-Queens", "url": "https://leetcode.com/problems/n-queens/", "logic": "Recursive placement." }
          ]
        },
        {
          "week": 8,
          "title": "DP & Graphs",
          "topics": ["Memoization", "Shortest Path"],
          "problems": [
            { "name": "Climbing Stairs", "url": "https://leetcode.com/problems/climbing-stairs/", "logic": "Fibonacci state." },
            { "name": "Number of Islands", "url": "https://leetcode.com/problems/number-of-islands/", "logic": "Connected components." }
          ]
        }
      ]
    };

    const roadmapGrid = document.getElementById('roadmap');

    data.weeks.forEach(w => {
      const card = document.createElement('div');
      card.className = 'week-card';

      const topicsHtml = w.topics.map(t => `<span class="topic-pill">${t}</span>`).join('');
      const problemsHtml = w.problems.map(p => `
        <a href="${p.url}" target="_blank" class="problem-link">
          <div class="problem-info">
            <span class="p-name">${p.name}</span>
            <span class="p-logic">${p.logic}</span>
          </div>
          <span style="color: var(--primary-blue)">→</span>
        </a>
      `).join('');

      card.innerHTML = `
        <div class="week-tag">Week ${w.week}</div>
        <div class="week-title">${w.title}</div>
        <div>${topicsHtml}</div>
        <div class="problem-container">${problemsHtml}</div>
      `;
      roadmapGrid.appendChild(card);
    });
</script>

</body>
</html>
